<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💸 Budget · Giulia</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FDF8F0;
  --white: #FFFFFF;
  --pink: #F5A8C0;
  --pink-light: #FDE8F0;
  --pink-dark: #E8769E;
  --yellow: #F7E077;
  --yellow-light: #FEF8D8;
  --green: #A8D5B5;
  --green-light: #E4F5EA;
  --green-dark: #5BAF7A;
  --lilac: #C4B5E8;
  --lilac-light: #EDE8F8;
  --blue: #9CC8E8;
  --blue-light: #E3F2FB;
  --peach: #F5C4A0;
  --peach-light: #FEF0E4;
  --ink: #1A1A2E;
  --ink2: #6B6B8A;
  --ink3: #A0A0BC;
  --border: #EDE8E0;
  --necessita: #A8D5B5;
  --entertainment: #F5A8C0;
  --personali: #C4B5E8;
  --trasporti: #9CC8E8;
  --abbonamenti: #F7E077;
  --regali: #F5C4A0;
  --altro: #D4D4E8;
  --animali: #B8D4B0;
  --nav-h: 72px;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
height: 100%;
font-family: ‘Nunito Sans’, sans-serif;
background: var(–cream);
color: var(–ink);
font-size: 14px;
overflow-x: hidden;
}

/* SCROLL CONTAINER */
.app {
min-height: 100vh;
padding-bottom: calc(var(–nav-h) + 16px);
}

/* HEADER */
.header {
background: var(–white);
padding: 52px 20px 16px;
border-bottom: 1.5px solid var(–border);
position: sticky; top: 0; z-index: 50;
}
.header-row {
display: flex; justify-content: space-between; align-items: center;
}
.header-logo { display: flex; align-items: center; gap: 10px; }
.logo-blob {
width: 38px; height: 38px;
background: var(–pink);
border-radius: 12px 12px 12px 4px;
display: flex; align-items: center; justify-content: center;
font-size: 20px;
}
.header-title h1 {
font-family: ‘Nunito’, sans-serif;
font-size: 18px; font-weight: 900; line-height: 1;
}
.header-title p { font-size: 11px; color: var(–ink3); font-weight: 600; margin-top: 1px; }
.header-date {
background: var(–cream); border-radius: 16px;
padding: 6px 12px; font-size: 11px; font-weight: 700;
color: var(–ink2); border: 1.5px solid var(–border);
}

/* MONTH SCROLLER */
.month-scroller {
display: flex; gap: 8px;
overflow-x: auto; padding: 12px 20px 4px;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.month-scroller::-webkit-scrollbar { display: none; }
.mbtn {
flex-shrink: 0;
padding: 7px 16px; border-radius: 20px;
border: 1.5px solid var(–border); background: var(–white);
font-family: ‘Nunito’, sans-serif; font-size: 13px; font-weight: 700;
color: var(–ink2); cursor: pointer; transition: all 0.15s;
white-space: nowrap;
}
.mbtn.active { background: var(–yellow); color: var(–ink); border-color: var(–yellow); }

/* VIEWS */
.view { display: none; padding: 16px 20px; }
.view.active { display: block; }

/* KPI CARDS */
.kpi-grid {
display: grid; grid-template-columns: 1fr 1fr;
gap: 10px; margin-bottom: 16px;
}
.kpi {
border-radius: 18px; padding: 16px;
border: 1.5px solid var(–border);
background: var(–white);
}
.kpi-emoji { font-size: 24px; margin-bottom: 6px; display: block; }
.kpi-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: var(–ink3); margin-bottom: 4px; }
.kpi-value { font-family: ‘Nunito’, sans-serif; font-size: 20px; font-weight: 900; line-height: 1; }
.kpi-value.pos { color: var(–green-dark); }
.kpi-value.neg { color: var(–pink-dark); }
.kpi-sub { font-size: 10px; color: var(–ink3); margin-top: 4px; font-weight: 600; }
.kpi-full { grid-column: 1 / -1; }

/* SECTION TITLE */
.section-title {
font-family: ‘Nunito’, sans-serif;
font-size: 16px; font-weight: 900;
margin-bottom: 12px; margin-top: 4px;
display: flex; align-items: center; gap: 6px;
}

/* PANEL */
.panel {
background: var(–white); border-radius: 18px;
padding: 16px; border: 1.5px solid var(–border);
margin-bottom: 12px;
}
.panel-title {
font-family: ‘Nunito’, sans-serif; font-size: 14px; font-weight: 900;
margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center;
}
.panel-tag {
font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 10px;
background: var(–pink-light); color: var(–pink-dark);
}
.panel-tag.green { background: var(–green-light); color: var(–green-dark); }
.panel-tag.yellow { background: var(–yellow-light); color: #9A7A00; }

/* INCOME */
.income-row {
display: flex; justify-content: space-between; align-items: center;
padding: 10px 12px; border-radius: 12px; background: var(–cream); margin-bottom: 8px;
}
.income-label { font-size: 13px; font-weight: 700; }
.income-amount { font-family: ‘Nunito’, sans-serif; font-size: 15px; font-weight: 900; color: var(–green-dark); }
.income-total {
background: var(–green-light); border-radius: 12px; padding: 12px;
display: flex; justify-content: space-between; align-items: center; margin-top: 6px;
}
.income-total .income-amount { font-size: 18px; }

/* CATEGORY BARS */
.cat-item { margin-bottom: 14px; }
.cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.cat-name { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
.cat-dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }
.cat-right { display: flex; gap: 8px; align-items: center; }
.cat-pct { font-size: 11px; font-weight: 800; color: var(–ink3); }
.cat-amount { font-family: ‘Nunito’, sans-serif; font-size: 13px; font-weight: 900; }
.bar-track { height: 7px; background: var(–cream); border-radius: 10px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 10px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
.cat-total {
font-family: ‘Nunito’, sans-serif; font-size: 12px; font-weight: 900;
background: var(–cream); padding: 6px 10px; border-radius: 8px;
display: inline-block; margin-bottom: 12px; color: var(–ink2);
}

/* FLAG ITEMS */
.flag-item {
display: flex; justify-content: space-between; align-items: center;
padding: 10px 12px; border-radius: 12px; background: var(–cream); margin-bottom: 8px;
}
.flag-date { font-size: 10px; font-weight: 700; color: var(–ink3); }
.flag-desc { font-size: 13px; font-weight: 700; margin-top: 1px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.flag-amt { font-family: ‘Nunito’, sans-serif; font-size: 14px; font-weight: 900; white-space: nowrap; margin-left: 10px; }

/* TOP EXPENSES */
.top-item {
display: flex; justify-content: space-between; align-items: center;
padding: 10px 12px; border-radius: 12px; background: var(–cream); margin-bottom: 8px;
}
.top-desc { font-size: 13px; font-weight: 700; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.top-sub { font-size: 10px; font-weight: 700; color: var(–ink3); margin-top: 1px; }
.top-amt { font-family: ‘Nunito’, sans-serif; font-size: 14px; font-weight: 900; color: var(–pink-dark); white-space: nowrap; }

/* MONTHLY TABLE - mobile card style */
.month-card {
background: var(–white); border-radius: 16px;
border: 1.5px solid var(–border); padding: 14px 16px;
margin-bottom: 10px; cursor: pointer;
transition: transform 0.15s;
}
.month-card:active { transform: scale(0.98); }
.month-card-header {
display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
}
.month-card-name { font-family: ‘Nunito’, sans-serif; font-size: 16px; font-weight: 900; }
.month-card-netto {
font-family: ‘Nunito’, sans-serif; font-size: 18px; font-weight: 900;
padding: 4px 12px; border-radius: 12px;
}
.month-card-netto.pos { background: var(–green-light); color: var(–green-dark); }
.month-card-netto.neg { background: var(–pink-light); color: var(–pink-dark); }
.month-card-row {
display: flex; justify-content: space-between;
font-size: 12px; font-weight: 600; color: var(–ink2); margin-bottom: 4px;
}
.month-card-row span:last-child { font-family: ‘Nunito’, sans-serif; font-weight: 800; color: var(–ink); }
.month-total-card {
background: var(–ink); border-radius: 16px; padding: 16px;
margin-bottom: 10px; color: var(–white);
}
.month-total-card .month-card-name { color: var(–white); }
.month-total-card .month-card-row { color: rgba(255,255,255,0.6); }
.month-total-card .month-card-row span:last-child { color: var(–white); }
.month-total-netto {
font-family: ‘Nunito’, sans-serif; font-size: 22px; font-weight: 900;
}

/* TRANSACTIONS */
.tx-filters {
display: flex; gap: 8px; overflow-x: auto;
padding-bottom: 4px; margin-bottom: 12px;
-webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.tx-filters::-webkit-scrollbar { display: none; }
.tx-filter {
flex-shrink: 0; padding: 7px 14px; border-radius: 16px;
border: 1.5px solid var(–border); background: var(–white);
font-family: ‘Nunito’, sans-serif; font-size: 12px; font-weight: 700;
color: var(–ink2); cursor: pointer;
}
.tx-filter.active { background: var(–ink); color: var(–white); border-color: var(–ink); }
.tx-filter.flag-filter.active { background: var(–pink); color: var(–white); border-color: var(–pink); }
.tx-search {
width: 100%; padding: 10px 16px; border-radius: 14px;
border: 1.5px solid var(–border); background: var(–white);
font-family: ‘Nunito Sans’, sans-serif; font-size: 13px; font-weight: 600;
color: var(–ink); outline: none; margin-bottom: 12px;
}
.tx-search:focus { border-color: var(–pink); }

.tx-card {
background: var(–white); border-radius: 14px;
border: 1.5px solid var(–border);
padding: 12px 14px; margin-bottom: 8px;
}
.tx-card.flagged { background: #FEF3F7; border-color: var(–pink); }
.tx-card-top {
display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;
}
.tx-card-desc {
font-size: 13px; font-weight: 700; flex: 1;
overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
padding-right: 10px;
}
.tx-card-amt {
font-family: ‘Nunito’, sans-serif; font-size: 15px; font-weight: 900;
white-space: nowrap; text-align: right;
}
.tx-card-bottom {
display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.tx-date-badge {
font-size: 10px; font-weight: 700; color: var(–ink3);
}
.src-badge {
font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 8px;
}
.src-revolut { background: var(–lilac-light); color: #7B5EA7; }
.src-intesa { background: var(–green-light); color: #3A7B55; }
.cat-select {
flex: 1; min-width: 0;
background: var(–cream); border: 1.5px solid var(–border);
border-radius: 8px; color: var(–ink);
font-family: ‘Nunito’, sans-serif; font-size: 11px; font-weight: 700;
padding: 4px 8px; cursor: pointer; outline: none;
max-width: 180px;
}
.persons-row {
display: flex; align-items: center; gap: 8px; margin-top: 6px;
}
.persons-label { font-size: 11px; font-weight: 700; color: var(–ink3); }
.persons-input {
width: 52px; background: var(–cream); border: 1.5px solid var(–border);
border-radius: 8px; color: var(–ink);
font-family: ‘Nunito’, sans-serif; font-size: 13px; font-weight: 800;
text-align: center; padding: 5px 4px; outline: none;
}
.persons-input:focus { border-color: var(–lilac); }

/* BOTTOM NAV */
.bottom-nav {
position: fixed; bottom: 0; left: 0; right: 0;
height: var(–nav-h);
background: var(–white);
border-top: 1.5px solid var(–border);
display: flex; align-items: center;
padding: 0 8px 8px;
z-index: 100;
box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}
.nav-item {
flex: 1; display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 3px; padding: 8px 4px; border-radius: 14px;
cursor: pointer; transition: all 0.15s;
border: none; background: none;
}
.nav-item.active { background: var(–yellow); }
.nav-icon { font-size: 22px; line-height: 1; }
.nav-label {
font-family: ‘Nunito’, sans-serif; font-size: 10px; font-weight: 800;
color: var(–ink3); letter-spacing: 0.03em;
}
.nav-item.active .nav-label { color: var(–ink); }

/* UTILS */
.pos { color: var(–green-dark); }
.neg { color: var(–pink-dark); }
.empty { text-align: center; padding: 32px; color: var(–ink3); font-size: 13px; font-weight: 600; }

/* TOAST */
.toast {
position: fixed; bottom: calc(var(–nav-h) + 12px); left: 50%; transform: translateX(-50%);
background: var(–ink); color: white;
font-family: ‘Nunito’, sans-serif; font-size: 13px; font-weight: 800;
padding: 12px 20px; border-radius: 20px;
opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
white-space: nowrap;
}
.toast.show { opacity: 1; }

/* DESKTOP LAYOUT — wider screens */
@media (min-width: 600px) {
.header { padding-top: 20px; }
.kpi-grid { grid-template-columns: repeat(4,1fr); }
.kpi-full { grid-column: auto; }
.grid2-desk { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid2-desk > * { margin-bottom: 0; }
.grid3-desk { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.grid3-desk > * { margin-bottom: 0; }
}
</style>

</head>

let txData = RAW_PLACEHOLDER.map(t=>({...t}));
let hasUnsaved = false;

function markDirty() {
  hasUnsaved = true;
  const btn = document.getElementById('save-btn');
  if(btn) { btn.style.background='var(--pink)'; btn.textContent='💾 Salva modifiche'; }
}

function saveToFile() {
  // Embed current txData state into a new HTML file and download it
  const currentData = JSON.stringify(txData, null, 0);
  let newHtml = document.documentElement.outerHTML;
  // Replace the data array with current state
  newHtml = newHtml.replace(/const RAW_PLACEHOLDER = \[[\s\S]*?\];/, 'const RAW_PLACEHOLDER = ' + currentData + ';');
  // Reset save button state in saved file
  newHtml = newHtml.replace(/💾 Salva modifiche/g, '💾 Salvato');
  
  const blob = new Blob([newHtml], {type: 'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const today = new Date().toISOString().slice(0,10);
  a.download = 'budget-giulia-' + today + '.html';
  a.click();
  
  hasUnsaved = false;
  const btn = document.getElementById('save-btn');
  if(btn) { btn.style.background='var(--green)'; btn.textContent='✓ Salvato!'; 
    setTimeout(()=>{ btn.style.background='var(--yellow)'; btn.textContent='💾 Salva'; },2000); }
  showToast('✓ File scaricato con le tue modifiche!');
}
let currentMonth = 'all';
let txFilter = 'all';
let txSearch = '';

const MACRO_COLORS = {
  'Necessità':'#A8D5B5','Entertainment':'#F5A8C0','Spese Personali':'#C4B5E8',
  'Trasporti':'#9CC8E8','Abbonamenti':'#F7E077','Regali':'#F5C4A0',
  'Altro':'#D4D4E8','Animali Domestici':'#B8D4B0','Entrate':'#A8D5B5'
};
const MACRO_EMOJIS = {
  'Necessità':'🌿','Entertainment':'🎉','Spese Personali':'💅',
  'Trasporti':'🚗','Abbonamenti':'📱','Regali':'🎁','Altro':'📦','Animali Domestici':'🐾'
};
const MONTHS_IT = {'2026-01':'Gennaio','2026-02':'Febbraio','2026-03':'Marzo','2026-04':'Aprile'};
const fmt = n => '€'+Math.abs(n).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtS = n => (n>=0?'+':'')+'€'+n.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});
const effAmt = t => t.amount/(t.persons||1);

function getFiltered() {
  return currentMonth==='all' ? txData : txData.filter(t=>t.date.startsWith(currentMonth));
}

function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  document.querySelectorAll('.nav-item').forEach((b,i)=>{
    b.classList.toggle('active',['overview','monthly','categories','transactions'][i]===tab);
  });
  render();
}

function setMonth(m) {
  currentMonth = m;
  document.querySelectorAll('.mbtn').forEach(b=>{
    const match = m==='all'?b.textContent.trim()==='YTD 2026':b.textContent.trim()===MONTHS_IT[m];
    b.classList.toggle('active',match);
  });
  render();
}

function setTxFilter(f,e) {
  txFilter=f;
  document.querySelectorAll('.tx-filter').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  renderTransactions();
}

function filterTx(v) { txSearch=v; renderTransactions(); }

function calcStats(txs) {
  const income = txs.filter(t=>t.macro==='Entrate'&&t.amount>0);
  const expenses = txs.filter(t=>t.macro!=='Entrate'&&t.amount<0);
  const stipendio = income.filter(t=>t.sub==='Stipendio').reduce((s,t)=>s+effAmt(t),0);
  const airbnb = income.filter(t=>t.sub==='Airbnb').reduce((s,t)=>s+effAmt(t),0);
  const altreEntrate = income.filter(t=>!['Stipendio','Airbnb'].includes(t.sub)).reduce((s,t)=>s+effAmt(t),0);
  const totIncome = stipendio+airbnb+altreEntrate;
  const totExpenses = expenses.reduce((s,t)=>s+effAmt(t),0);
  return {stipendio,airbnb,altreEntrate,totIncome,totExpenses,netto:totIncome+totExpenses};
}

function render() {
  renderKPI(); renderIncomeBreakdown(); renderMacroBreakdown();
  renderTopExpenses(); renderFlagPreview(); renderMonthly();
  renderCategoryPanels(); renderTransactions();
}

function renderKPI() {
  const txs=getFiltered(), s=calcStats(txs);
  const flags=txs.filter(t=>t.flag).length;
  document.getElementById('kpi-row').innerHTML=`
    <div class="kpi" style="background:var(--green-light);border-color:var(--green)">
      <span class="kpi-emoji">💰</span>
      <div class="kpi-label">Entrate</div>
      <div class="kpi-value pos">${fmt(s.totIncome)}</div>
    </div>
    <div class="kpi" style="background:var(--pink-light);border-color:var(--pink)">
      <span class="kpi-emoji">🛍️</span>
      <div class="kpi-label">Uscite</div>
      <div class="kpi-value neg">${fmt(s.totExpenses)}</div>
    </div>
    <div class="kpi kpi-full" style="background:${s.netto>=0?'var(--green-light)':'var(--pink-light)'};border-color:${s.netto>=0?'var(--green)':'var(--pink)'}">
      <span class="kpi-emoji">${s.netto>=0?'🥳':'😬'}</span>
      <div class="kpi-label">Netto periodo</div>
      <div class="kpi-value ${s.netto>=0?'pos':'neg'}" style="font-size:28px">${fmtS(s.netto)}</div>
      <div class="kpi-sub">${s.netto>=0?'Mese positivo ✓':'Da riequilibrare'}</div>
    </div>`;
  const fb = document.getElementById('flag-badge2');
  if(fb) fb.textContent=flags+' tx';
  const fb2 = document.getElementById('flag-count-badge');
  if(fb2) fb2.textContent='YTD';
}

function renderIncomeBreakdown() {
  const s=calcStats(getFiltered());
  const rows=[
    {label:'💼 Stipendio LVMH / Moët',amount:s.stipendio},
    {label:'🏠 Airbnb',amount:s.airbnb},
    {label:'✨ Altre entrate',amount:s.altreEntrate},
  ].filter(r=>r.amount>0);
  document.getElementById('income-breakdown').innerHTML=
    rows.map(r=>`<div class="income-row">
      <span class="income-label">${r.label}</span>
      <span class="income-amount">${fmt(r.amount)}</span>
    </div>`).join('')+
    `<div class="income-total">
      <span class="income-label" style="font-weight:900;font-size:14px">Totale</span>
      <span class="income-amount" style="font-size:20px">${fmt(s.totIncome)}</span>
    </div>`;
}

function renderMacroBreakdown() {
  const txs=getFiltered().filter(t=>t.macro!=='Entrate'&&t.amount<0);
  const byMacro={};
  txs.forEach(t=>{byMacro[t.macro]=(byMacro[t.macro]||0)+Math.abs(effAmt(t));});
  const total=Object.values(byMacro).reduce((s,v)=>s+v,0);
  document.getElementById('macro-breakdown').innerHTML=
    Object.entries(byMacro).sort((a,b)=>b[1]-a[1]).map(([macro,amt])=>{
      const pct=total>0?(amt/total*100):0;
      return `<div class="cat-item">
        <div class="cat-header">
          <div class="cat-name"><span style="font-size:15px">${MACRO_EMOJIS[macro]||'📦'}</span>${macro}</div>
          <div class="cat-right">
            <span class="cat-pct">${pct.toFixed(0)}%</span>
            <span class="cat-amount">${fmt(amt)}</span>
          </div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${MACRO_COLORS[macro]||'#DDD'}"></div></div>
      </div>`;
    }).join('');
}

function renderTopExpenses() {
  const txs=getFiltered().filter(t=>t.amount<0&&t.macro!=='Entrate').sort((a,b)=>effAmt(a)-effAmt(b)).slice(0,6);
  document.getElementById('top-expenses').innerHTML=txs.map(t=>`
    <div class="top-item">
      <div>
        <div class="top-desc">${t.description}</div>
        <div class="top-sub">${t.sub}</div>
      </div>
      <div class="top-amt">${fmt(effAmt(t))}${t.persons>1?`<span style="font-size:10px;color:var(--ink3)"> ÷${t.persons}</span>`:''}</div>
    </div>`).join('');
}

function renderFlagPreview() {
  const flags=getFiltered().filter(t=>t.flag);
  if(!flags.length){document.getElementById('flag-preview').innerHTML='<div class="empty">🎉 Tutto ok!</div>';return;}
  document.getElementById('flag-preview').innerHTML=flags.slice(0,5).map(t=>`
    <div class="flag-item">
      <div style="flex:1;min-width:0">
        <div class="flag-date">${t.date}</div>
        <div class="flag-desc">${t.description}</div>
      </div>
      <div class="flag-amt" style="color:${t.amount>=0?'var(--green-dark)':'var(--pink-dark)'}">
        ${t.amount>=0?'+':''}${fmt(t.amount)}
      </div>
    </div>`).join('')+
    (flags.length>5?`<div style="text-align:center;padding:8px;font-size:12px;font-weight:700;color:var(--ink3)">+${flags.length-5} altre</div>`:'');
}

function renderMonthly() {
  const months=['2026-01','2026-02','2026-03','2026-04'];
  let totStip=0,totAir=0,totAlt=0,totIn=0,totExp=0,totNet=0;
  let html=months.map(m=>{
    const txs=txData.filter(t=>t.date.startsWith(m));
    const s=calcStats(txs);
    totStip+=s.stipendio;totAir+=s.airbnb;totAlt+=s.altreEntrate;
    totIn+=s.totIncome;totExp+=s.totExpenses;totNet+=s.netto;
    return `<div class="month-card" onclick="setMonth('${m}');switchTab('overview')">
      <div class="month-card-header">
        <span class="month-card-name">${MONTHS_IT[m]}</span>
        <span class="month-card-netto ${s.netto>=0?'pos':'neg'}">${fmtS(s.netto)}</span>
      </div>
      ${s.stipendio>0?`<div class="month-card-row"><span>💼 Stipendio</span><span class="pos">${fmt(s.stipendio)}</span></div>`:''}
      ${s.airbnb>0?`<div class="month-card-row"><span>🏠 Airbnb</span><span class="pos">${fmt(s.airbnb)}</span></div>`:''}
      ${s.altreEntrate>0?`<div class="month-card-row"><span>✨ Altre entrate</span><span class="pos">${fmt(s.altreEntrate)}</span></div>`:''}
      <div class="month-card-row"><span>🛍️ Uscite totali</span><span class="neg">${fmt(s.totExpenses)}</span></div>
    </div>`;
  }).join('');
  html+=`<div class="month-total-card">
    <div class="month-card-header">
      <span class="month-card-name">📊 Totale YTD</span>
    </div>
    <div class="month-card-row"><span>💰 Entrate totali</span><span>${fmt(totIn)}</span></div>
    <div class="month-card-row"><span>🛍️ Uscite totali</span><span>${fmt(totExp)}</span></div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.2);display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:14px;font-weight:800;color:rgba(255,255,255,0.8)">Netto</span>
      <span class="month-total-netto" style="color:${totNet>=0?'#A8D5B5':'var(--pink)'}">${fmtS(totNet)}</span>
    </div>
  </div>`;
  document.getElementById('monthly-cards').innerHTML=html;
}

function renderCategoryPanel(elId,macro) {
  const txs=getFiltered().filter(t=>t.macro===macro&&t.amount<0);
  const bySub={};
  txs.forEach(t=>{bySub[t.sub]=(bySub[t.sub]||0)+Math.abs(effAmt(t));});
  const total=Object.values(bySub).reduce((s,v)=>s+v,0);
  const color=MACRO_COLORS[macro]||'#DDD';
  const sorted=Object.entries(bySub).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length){document.getElementById(elId).innerHTML='<div class="empty">Nessuna spesa 🎉</div>';return;}
  document.getElementById(elId).innerHTML=
    `<span class="cat-total">Totale: ${fmt(total)}</span>`+
    sorted.map(([sub,amt])=>{
      const pct=total>0?(amt/total*100):0;
      return `<div class="cat-item">
        <div class="cat-header">
          <div class="cat-name"><span class="cat-dot" style="background:${color}"></span>${sub}</div>
          <div class="cat-right"><span class="cat-pct">${pct.toFixed(0)}%</span><span class="cat-amount">${fmt(amt)}</span></div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
    }).join('');
}

function renderCategoryPanels() {
  ['Necessità','Entertainment','Spese Personali','Trasporti','Abbonamenti','Regali'].forEach(m=>{
    renderCategoryPanel('cat-'+m.toLowerCase().replace(/ /g,'-').replace('è','e').replace('à','a').replace('ì','i'),m);
  });
  renderCategoryPanel('cat-necessita','Necessità');
  renderCategoryPanel('cat-entertainment','Entertainment');
  renderCategoryPanel('cat-personali','Spese Personali');
  renderCategoryPanel('cat-trasporti','Trasporti');
  renderCategoryPanel('cat-abbonamenti','Abbonamenti');
  renderCategoryPanel('cat-regali','Regali');
  const txs=getFiltered().filter(t=>['Altro','Animali Domestici'].includes(t.macro)&&t.amount<0);
  const bySub={};
  txs.forEach(t=>{bySub[t.sub]=(bySub[t.sub]||0)+Math.abs(effAmt(t));});
  const total=Object.values(bySub).reduce((s,v)=>s+v,0);
  document.getElementById('cat-altro').innerHTML=
    `<span class="cat-total">Totale: ${fmt(total)}</span>`+
    Object.entries(bySub).sort((a,b)=>b[1]-a[1]).map(([sub,amt])=>{
      const pct=total>0?(amt/total*100):0;
      return `<div class="cat-item">
        <div class="cat-header">
          <div class="cat-name"><span class="cat-dot" style="background:#D4D4E8"></span>${sub}</div>
          <div class="cat-right"><span class="cat-amount">${fmt(amt)}</span></div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#D4D4E8"></div></div>
      </div>`;
    }).join('');
}

];

function renderTransactions() {
  let txs=getFiltered();
  if(txFilter==='expense') txs=txs.filter(t=>t.amount<0&&t.macro!=='Entrate');
  else if(txFilter==='income') txs=txs.filter(t=>t.amount>0||t.macro==='Entrate');
  else if(txFilter==='flag') txs=txs.filter(t=>t.flag);
  else if(txFilter==='shared') txs=txs.filter(t=>t.shared_flag||(t.persons&&t.persons>1));
  if(txSearch) txs=txs.filter(t=>t.description.toLowerCase().includes(txSearch.toLowerCase()));

  if(!txs.length){document.getElementById('tx-list').innerHTML='<div class="empty">Nessuna transazione 🔍</div>';return;}

  document.getElementById('tx-list').innerHTML=txs.map(t=>{
    const persons=t.persons||1;
    const eff=t.amount/persons;
    const amtColor=t.amount>=0?'var(--green-dark)':'var(--pink-dark)';
    const catVal=t.macro+'/'+t.sub;
    const amtDisplay=persons>1
      ?`<span style="color:var(--ink3);text-decoration:line-through;font-size:11px;display:block">${fmt(t.amount)}</span><span style="color:${amtColor}">${t.amount>=0?'+':''}${fmt(eff)} ÷${persons}</span>`
      :`<span style="color:${amtColor}">${t.amount>=0?'+':''}${fmt(t.amount)}</span>`;
    const flags=(t.flag?'⚑ ':'')+(t.shared_flag&&persons===1?'👥 ':'');
    return `<div class="tx-card${t.flag?' flagged':''}">
      <div class="tx-card-top">
        <div class="tx-card-desc">${flags}${t.description}</div>
        <div class="tx-card-amt">${amtDisplay}</div>
      </div>
      <div class="tx-card-bottom">
        <span class="tx-date-badge">${t.date.slice(5).replace('-','/')}</span>
        <span class="src-badge ${t.source==='Revolut'?'src-revolut':'src-intesa'}">${t.source}</span>
        <select class="cat-select" onchange="updateCat(${t.id},this.value)">
          ${ALL_CATS.map(c=>`<option value="${c}"${c===catVal?' selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="persons-row">
        <span class="persons-label">👥 Persone:</span>
        <input type="number" min="1" max="20" value="${persons}" class="persons-input" oninput="updatePersons(${t.id},this.value)">
        ${persons>1?`<span style="font-size:11px;font-weight:700;color:var(--green-dark)">→ tua quota: ${fmt(eff)}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function updatePersons(id,val) {
  const tx=txData.find(t=>t.id===id);
  if(tx){tx.persons=Math.max(1,parseInt(val)||1);markDirty();showToast('✓ Aggiornato!');render();}
}

function updateCat(id,val) {
  const parts=val.split('/');
  const tx=txData.find(t=>t.id===id);
  if(tx){
    tx.macro=parts[0];tx.sub=parts.slice(1).join('/');
    if(tx.macro!=='Altro'&&tx.macro!=='Entrate') tx.flag=false;
    markDirty();showToast('✓ Aggiornato!');render();
  }
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

render();
</script>
